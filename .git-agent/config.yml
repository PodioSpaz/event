scopes:
    - name: app
      description: CLI commands and application entry points in Sources/event/ and Sources/EventCommands/; does not cover backend models or sync logic
    - name: mod
      description: Core data models, protocols, and utilities in Sources/EventModels/; does not cover sync service implementation
    - name: sync
      description: Cloudflare sync service logic and D1 client in Sources/EventSync/; does not cover CLI commands or core models
    - name: tst
      description: Test suites for all application logic, models, and sync components in Tests/; does not cover production code
    - name: skl
      description: External integration skills and worker implementation in skills/; does not cover main application logic
    - name: fmt
      description: Homebrew formula definitions for package distribution in Formula/; does not cover source code or tests
